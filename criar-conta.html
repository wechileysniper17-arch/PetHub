<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - PetHub</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🐾 PetHub</h1>

        <h2>Criar Conta</h2>

        <form>

            <input type="text"
                   placeholder="Nome Completo"
                   required>

            <input type="email"
                   placeholder="Digite seu e-mail"
                   required>

            <input type="password"
                   placeholder="Crie uma senha"
                   required>

            <input type="password"
                   placeholder="Confirme sua senha"
                   required>

            <button type="submit">
                Criar Conta
            </button>

        </form>

        <p>
            Já possui conta?
            <a href="login.html">
                Fazer Login
            </a>
        </p>

    </div>

</body>
</html>
