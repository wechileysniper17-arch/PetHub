<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Pet - PetHub</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="container">

        <h1>🐾 PetHub</h1>

        <nav>
            <a href="index.html">Home</a> |
            <a href="conta.html">Minha Conta</a> |
            <a href="login.html">Login</a>
        </nav>

        <h2>Cadastrar Pet</h2>

        <form id="formPet">

            <input type="text" id="nome" placeholder="Nome do Pet" required>
            <input type="text" id="especie" placeholder="Espécie" required>
            <input type="text" id="raca" placeholder="Raça" required>
            <input type="number" id="idade" placeholder="Idade" required>
            <input type="number" id="peso" placeholder="Peso" required>
            <input type="text" id="tutor" placeholder="Nome do Tutor" required>

            <button type="submit">Cadastrar Pet</button>

        </form>

        <h2>Pets Cadastrados</h2>

        <div id="listaPets"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
